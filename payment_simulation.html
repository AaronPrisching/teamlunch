<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPal Zahlung - TeamLunch</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paypal: {
                            blue: '#003087',
                            lightblue: '#009cde',
                        }
                    },
                    fontFamily: {
                        'poppins': ['Poppins', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f5f5f5;
            font-family: 'Poppins', sans-serif;
        }
        .paypal-button {
            background-color: #ffc439;
            color: #003087;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            padding: 10px 24px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .paypal-button:hover {
            background-color: #f1bb36;
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <!-- PayPal Header -->
        <div class="w-full max-w-md bg-white rounded-lg shadow-lg overflow-hidden mb-8">
            <div class="bg-paypal-blue p-4 text-center">
                <img src="https://www.paypalobjects.com/webstatic/mktg/logo/pp_cc_mark_37x23.jpg" alt="PayPal Logo" class="h-8 mx-auto">
            </div>
            
            <div class="p-6">
                <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Bezahlen mit PayPal</h1>
                
                <div class="mb-6 border-b border-gray-200 pb-6">
                    <p class="text-gray-600 mb-2">TeamLunch Bestellung: {{ order_id }}</p>
                    <div class="flex justify-between items-center">
                        <span class="font-semibold text-gray-800">Gesamtbetrag:</span>
                        <span class="font-bold text-xl text-gray-800">{{ amount }} €</span>
                    </div>
                </div>
                
                <!-- Payment Options -->
                <div class="space-y-4 mb-6">
                    <div class="bg-gray-50 p-4 rounded border border-gray-200">
                        <div class="flex items-center">
                            <input type="radio" id="paypal-account" name="payment-method" class="mr-3" checked>
                            <label for="paypal-account" class="flex-grow">
                                <div class="font-medium text-gray-800">PayPal</div>
                                <div class="text-sm text-gray-600">Schnell und sicher bezahlen</div>
                            </label>
                        </div>
                    </div>
                    
                    <div class="bg-gray-50 p-4 rounded border border-gray-200">
                        <div class="flex items-center">
                            <input type="radio" id="credit-card" name="payment-method" class="mr-3">
                            <label for="credit-card" class="flex-grow">
                                <div class="font-medium text-gray-800">Kreditkarte</div>
                                <div class="text-sm text-gray-600">Alle gängigen Karten werden akzeptiert</div>
                            </label>
                            <div class="flex space-x-1">
                                <img src="https://www.paypalobjects.com/webstatic/mktg/logo-center/card_visa.svg" alt="Visa" class="h-6">
                                <img src="https://www.paypalobjects.com/webstatic/mktg/logo-center/card_mastercard.svg" alt="Mastercard" class="h-6">
                                <img src="https://www.paypalobjects.com/webstatic/mktg/logo-center/card_amex.svg" alt="Amex" class="h-6">
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Action Buttons -->
                <div class="flex flex-col space-y-3">
                    <a href="/process_payment?order_id={{ order_id }}" class="paypal-button text-center">
                        Jetzt bezahlen
                    </a>
                    <a href="/order.html" class="text-paypal-blue text-center text-sm">
                        Abbrechen und zurück
                    </a>
                </div>
            </div>
            
            <div class="bg-gray-50 p-4 text-center text-xs text-gray-500 border-t border-gray-200">
                <p>Durch Ihre Zahlung stimmen Sie den Nutzungsbedingungen zu.</p>
                <p class="mt-1">© 1999-2023 PayPal, Inc. Alle Rechte vorbehalten.</p>
            </div>
        </div>
    </div>
</body>
</html>
